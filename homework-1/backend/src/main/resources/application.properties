# Server runs on port 3000 (matches PROMPT.md / sample requests)
server.port=3000
spring.application.name=banking-api

# Rate limiting (Task 4D): 100 requests per minute per IP
ratelimit.enabled=true
ratelimit.limit=100
ratelimit.window-seconds=60

# Actuator — health endpoint at /actuator/health
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# OpenAPI spec at /v3/api-docs (rendered by Scalar at /docs)
springdoc.api-docs.path=/v3/api-docs
