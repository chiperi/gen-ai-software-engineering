# Local dev stack: API + PostgreSQL. Not for production (no secrets here).
services:
  app:
    build: .
    ports: ["8000:8000"]
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://cards:cards@db:5432/cards
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cards
      POSTGRES_PASSWORD: cards
      POSTGRES_DB: cards
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cards"]
      interval: 5s
      timeout: 3s
      retries: 10
