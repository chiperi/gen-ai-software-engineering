name: contract-tests
on: [push, pull_request]
jobs:
  schemathesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" schemathesis
      - name: start service
        run: uvicorn app.main:app --port 8000 & sleep 3
      - name: conformance (responses match openapi.yaml, FF-005)
        run: schemathesis run contracts/openapi.yaml --base-url http://localhost:8000 --checks all
